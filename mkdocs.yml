site_name: SutroYaro
site_description: Sutro Group - Energy-Efficient AI Training Research
site_url: https://0bserver07.github.io/SutroYaro/
repo_url: https://github.com/0bserver07/SutroYaro
repo_name: 0bserver07/SutroYaro

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Context: context.md
  - Goals: goals.md
  - Google Docs:
      - Challenge 1 - Sparse Parity: google-docs/challenge-1-sparse-parity.md
      - Sutro Group Main: google-docs/sutro-group-main.md
      - Yaroslav Sprint 1: google-docs/yaroslav-technical-sprint-1.md
  - Meetings:
      - Overview: meetings/index.md
      - Meeting Notes: meetings/notes.md
  - Homework:
      - All Homework: homework/index.md
  - Lectures: lectures/index.md
  - Research:
      - Overview: research/index.md
      - Literature Review: research/sparse-parity-literature.md
  - Findings:
      - Sprint 1 (ARD Baseline): findings/sprint-1-findings.md
      - Exp 1 - Fix Hyperparams: findings/exp1_fix_hyperparams.md
      - Exp 4 - GrokFast: findings/exp4_grokfast.md
  - Plans:
      - Pipeline Design: plans/2026-03-03-sparse-parity-pipeline-design.md
      - Implementation Plan: plans/2026-03-03-sparse-parity-implementation.md
      - Beat 20-bit Research: plans/2026-03-04-beat-20bit-research-plan.md
      - Sprint 2: plans/sprint-2-plan.md
  - References: references.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/0bserver07/SutroYaro
    - icon: fontawesome/brands/telegram
      link: https://t.me/sutro_group
